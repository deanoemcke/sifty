<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sifty</title>
</head>
<body>
<div class="app-layout">
<aside class="sidebar">
  <header>
    <div class="brand">
      <img src="sifty-logo.png" alt="Sifty logo">
      <h1>Sifty</h1>
    </div>
  </header>

  <nav class="sidebar-tabs" role="tablist">
    <button id="searchTabBtn" class="sidebar-tab active" role="tab" aria-selected="true" aria-controls="searchTabPanel">Search</button>
    <button id="favouritesTabBtn" class="sidebar-tab" role="tab" aria-selected="false" aria-controls="savedSearchesPanel">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      Favourites
      <span id="savedSearchesCount" class="results-count hidden">0</span>
    </button>
  </nav>

  <div id="searchTabPanel" role="tabpanel">

  <!-- Discovery prompt -->
  <div id="discoveryCard" class="card" style="margin-bottom:0.875rem">
    <div class="card-label">what shiny new thing are you looking for?</div>
    <textarea id="discoveryPrompt" rows="3" style="width:100%;resize:vertical;margin-bottom:0.75rem" placeholder="e.g. a MacBook Pro M3, good condition"></textarea>
    <label style="display:block;font-size:0.8rem;color:var(--muted);margin-bottom:0.25rem">What's the most you want to pay?</label>
    <input id="discoveryMaxPrice" type="number" min="0" placeholder="e.g. 2000" style="width:100%;margin-bottom:0.75rem" />
    <label style="display:block;font-size:0.8rem;color:var(--muted);margin-bottom:0.25rem">Fulfillment</label>
    <select id="discoveryFulfillment" style="margin-bottom:0.5rem">
      <option value="any">Pickup or Shipping</option>
      <option value="pickup">Pickup only</option>
    </select>
    <select id="discoveryRegion" style="margin-bottom:0.75rem;display:none">
      <option value="">Select a region…</option>
    </select>
    <div style="display:flex;justify-content:center">
      <button id="discoveryBtn" class="btn btn-primary" disabled>Get it!</button>
    </div>
    <div id="discoveryError" style="display:none;margin-top:0.5rem;color:var(--red);font-size:0.85rem;text-align:center"></div>
  </div>

  <!-- Search title bar -->
  <div id="searchTitleBar">
    <div style="display:flex;align-items:center;gap:0.625rem">
      <span style="font-size:1.05rem;font-weight:600;color:var(--text)">Sifting for: </span><span id="searchTitle">new shiny thing</span>
      <button id="saveCurrentBtn" class="btn btn-primary hidden" style="padding:0.25rem 0.75rem;font-size:0.8rem">Add to favourites</button>
    </div>
  </div>

  <!-- URL cards (populated by JS) -->
  <div id="urlCardsContainer"></div>
  <button id="addUrlBtn" class="btn btn-secondary" style="width:100%;justify-content:center;margin-bottom:0.875rem;border-style:dashed">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add URL
  </button>

  <!-- AI Filter -->
  <div class="card">
    <div class="card-label">AI Filter</div>
    <label for="aiFilter">Provide a detailed description to help filter out undesired results</label>
    <div style="display:flex;gap:0.5rem;align-items:flex-start;margin-top:0.4rem">
      <textarea id="aiFilter" rows="3" style="flex:1;resize:vertical" placeholder="e.g. good condition, no major damage, prefer aluminium frame"></textarea>
      <button id="applyAiFilterBtn" class="btn btn-primary" style="display:none">Update filter</button>
    </div>
  </div>

  <!-- Status bar -->
  <div id="statusBar" class="status-bar info hidden"></div>

  <!-- Results -->
  <div id="resultsSection" class="hidden">
    <div class="results-header">
      <h2>Results</h2>
      <span class="results-count" id="resultCount">0</span>
      <span id="filteredCount" class="filtered-count hidden">Filtered <strong id="filteredCountNum">0</strong> <button id="toggleFilteredBtn" class="cache-clear-btn">show</button></span>
      <button class="btn btn-secondary" id="deepBtn" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Deep Search
      </button>
    </div>
  </div>

  </div><!-- /searchTabPanel -->

  <div id="savedSearchesPanel" class="card hidden" role="tabpanel">
    <div id="savedSearchesList">
      <p class="deep-empty" id="savedSearchesEmpty">No favourites yet.</p>
    </div>
  </div>
</aside>

<main class="main-pane">
  <div id="listingsContainer"></div>
</main>
</div>

<!-- Save favourite modal -->
<div id="saveSearchModal" class="modal-backdrop hidden">
  <div class="modal">
    <p class="modal-title">Save favourite</p>
    <input type="text" id="saveSearchName" placeholder="Name this favourite…" style="width:100%;margin-bottom:0.75rem" />
    <div style="display:flex;gap:0.5rem;justify-content:flex-end">
      <button id="saveSearchCancelBtn" class="btn btn-secondary">Cancel</button>
      <button id="saveSearchConfirmBtn" class="btn btn-primary">Save</button>
    </div>
  </div>
</div>

<script type="module" src="/src/frontend/app.ts"></script>
</body>
</html>
